<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Asana Authorization</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F2EAE1; color: #1A1A14; padding: 24px; }
    .card { background: white; border-radius: 12px; padding: 40px 44px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: #67813B; text-transform: uppercase; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 400; margin-bottom: 12px; }
    .sub { font-size: 13px; color: #7a6a5a; line-height: 1.6; margin-bottom: 24px; }
    .code-box { background: #F2EAE1; border: 1px solid #d4c9be; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 16px; color: #1A1A14; }
    button { width: 100%; padding: 12px; background: #67813B; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:active { opacity: 0.85; }
    .error { color: #c0392b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Institute for Humane Studies</div>
    <h1>Authorization Code</h1>
    <div class="sub" id="msg">Reading authorization code…</div>
    <div class="code-box" id="code-box" style="display:none"></div>
    <button id="copy-btn" style="display:none" onclick="copyCode()">Copy code</button>
  </div>
  <script>
    var code = new URLSearchParams(window.location.search).get('code');
    var error = new URLSearchParams(window.location.search).get('error');

    if (error) {
      document.getElementById('msg').textContent = 'Authorization was cancelled. You can close this tab.';
    } else if (code) {
      // Try postMessage first (popup flow)
      if (window.opener) {
        window.opener.postMessage({ asanaCode: code }, '*');
        window.close();
      }
      // Fallback: show the code for manual paste
      document.getElementById('msg').textContent = 'Copy this code and paste it into the Impact Story Browser:';
      document.getElementById('code-box').textContent = code;
      document.getElementById('code-box').style.display = 'block';
      document.getElementById('copy-btn').style.display = 'block';
    } else {
      document.getElementById('msg').className = 'sub error';
      document.getElementById('msg').textContent = 'No code found. Return to the app and try again.';
    }

    function copyCode() {
      var code = document.getElementById('code-box').textContent;
      navigator.clipboard.writeText(code).then(function() {
        document.getElementById('copy-btn').textContent = 'Copied!';
        setTimeout(function(){ document.getElementById('copy-btn').textContent = 'Copy code'; }, 2000);
      });
    }
  </script>
</body>
</html>
